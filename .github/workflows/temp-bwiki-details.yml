name: Temporary BWiki legacy source fetch

on:
  push:
    branches:
      - agent/bwiki-p3-preview-checkpoint
    paths:
      - .github/workflows/temp-bwiki-details.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    name: Fetch 学院呱呱 source
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch official MediaWiki API source
        shell: bash
        run: |
          curl -L --fail --silent --show-error \
            --retry 30 --retry-all-errors --retry-delay 10 \
            'https://wiki.biligame.com/rocom/api.php?action=query&prop=revisions&rvprop=content&rvslots=main&titles=%E5%AD%A6%E9%99%A2%E5%91%B1%E5%91%B1&format=json&formatversion=2' \
            --output xueyuan-guagua-source.json

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: xueyuan-guagua-source-${{ github.run_id }}
          retention-days: 1
          if-no-files-found: error
          path: xueyuan-guagua-source.json
